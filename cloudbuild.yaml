# PersonaMimic Industrial Deployment
# To run this: gcloud builds submit --config cloudbuild.yaml . --substitutions=_PROJECT_ID=YOUR_PROJECT_ID

steps:
  # 1. Build & Push Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/${_PROJECT_ID}/personamimic-repo/backend', './backend']
    env: ['DOCKER_BUILDKIT=1']
    id: 'build-backend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/${_PROJECT_ID}/personamimic-repo/backend']
    id: 'push-backend'

  # 2. Build & Push Frontend (Nginx Container)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/${_PROJECT_ID}/personamimic-repo/frontend', './frontend']
    env: ['DOCKER_BUILDKIT=1']
    id: 'build-frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/${_PROJECT_ID}/personamimic-repo/frontend']
    id: 'push-frontend'

  # 3. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'personamimic-backend'
      - '--image'
      - 'us-central1-docker.pkg.dev/${_PROJECT_ID}/personamimic-repo/backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8055'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--set-env-vars'
      - 'DATABASE_URL=postgresql://user:pass@host:5432/db?sslmode=require,GROQ_API_KEY=your_groq_key,WHOP_API_KEY=your_whop_key,WHOP_COMPANY_ID=your_whop_company_id,USE_CLOUD=true,SECURITY_KEY=your_security_key,CURRENT_MODEL=llama-3.3-70b-versatile,OLLAMA_CLOUD_URL=https://api.groq.com/openai/v1,OLLAMA_CLOUD_KEY=your_ollama_key,GOOGLE_API_KEY=your_google_key,GOOGLE_CSE_ID=your_google_cse_id'
    id: 'deploy-backend'

  # 4. Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'personamimic-frontend'
      - '--image'
      - 'us-central1-docker.pkg.dev/${_PROJECT_ID}/personamimic-repo/frontend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'BACKEND_URL=https://personamimic-backend.a.run.app'
    id: 'deploy-frontend'

substitutions:
  _PROJECT_ID: 'your-project-id'

images:
  - 'us-central1-docker.pkg.dev/${_PROJECT_ID}/personamimic-repo/backend'
  - 'us-central1-docker.pkg.dev/${_PROJECT_ID}/personamimic-repo/frontend'
