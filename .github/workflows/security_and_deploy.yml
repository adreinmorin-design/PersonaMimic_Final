name: Security Scan and Code Quality
    
    on:
      push:
        branches: [ main ]
      pull_request:
        branches: [ main ]
    
    jobs:
      security_scan:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v3
        - name: Gitleaks scan
          uses: gitleaks/gitleaks-action@v2
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            # Add GITLEAKS_LICENSE if you have one
    
      code_quality:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v3
        - name: Set up Python
          uses: actions/setup-python@v3
          with:
            python-version: '3.x'
        - name: Install dependencies
          run: pip install ruff
        - name: Run ruff
          run: ruff check --select=E,F,W .
    
    
