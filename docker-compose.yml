version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8055:8055"
    environment:
      - DATABASE_URL=postgresql://mimic:mimic@postgres:5432/personamimic
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=mimic
      - POSTGRES_PASSWORD=mimic
      - POSTGRES_DB=personamimic
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222" # Monitor port

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
